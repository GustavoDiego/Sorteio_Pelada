name: Health Wake

on:
  schedule:
    - cron: "*/50 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake API
        env:
          HEALTH_URL: ${{ secrets.RENDER_API_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "RENDER_API_HEALTH_URL secret is not set."
            exit 1
          fi
          curl -fsS "$HEALTH_URL" > /dev/null
